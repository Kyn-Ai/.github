<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 260" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f8ff"/>
    </linearGradient>

    <filter id="greenGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00FF00" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#00FF00" flood-opacity="0.8"/>
    </filter>

    <style>
      @keyframes neon-blink {
        0%, 45% { filter: url(#greenGlow); }
        48%, 52% { filter: none; }
        55%, 58% { filter: url(#greenGlow); }
        60%, 95% { filter: none; }
        100% { filter: url(#greenGlow); }
      }

      .blink-legs {
        fill: #0c0e14;
        animation: neon-blink 3s infinite;
      }

      .solid-structure {
        fill: #0c0e14;
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="10"/>
  <rect x="4" y="4" width="242" height="252" fill="none" stroke="#0c0e14" stroke-opacity="0.14" rx="8"/>

  <g class="blink-legs">
    <path d="M 78,90
             L 45,155
             L 65,155
             L 35,235
             L 85,145
             L 65,145
             L 108,90 Z"/>

    <path d="M 148,90
             L 115,155
             L 135,155
             L 105,235
             L 155,145
             L 135,145
             L 178,90 Z"/>
  </g>

  <path class="solid-structure" d="M 45,115
                                   C 50,90 65,75 85,75
                                   L 215,75
                                   L 205,95
                                   L 85,95
                                   C 70,95 60,100 45,115 Z"/>

  <g aria-label="ownership-watermark">
    <text x="125" y="246" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0c0e14" opacity="0.28">OFFICIAL LOGO · OWNED</text>
    <text x="8" y="257" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#0c0e14" opacity="0.38">© Kyn AI · KynAI</text>
  </g>
</svg>
