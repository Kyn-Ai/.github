<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="darkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      /* Strict ON/OFF Animation 
        Using tight percentage gaps to create a sharp snap, 
        zero fading or "continuous" breathing.
      */
      @keyframes strictOnOff {
        0%      { opacity: 0; }
        19.9%   { opacity: 0; }
        20%     { opacity: 1; } /* Snap ON */
        24.9%   { opacity: 1; }
        25%     { opacity: 0; } /* Snap OFF */
        29.9%   { opacity: 0; }
        30%     { opacity: 1; } /* Snap ON */
        89.9%   { opacity: 1; }
        90%     { opacity: 0; } /* Snap OFF */
        100%    { opacity: 0; }
      }

      .glow-layer {
        animation: strictOnOff 4s infinite;
        stroke: #005522; /* Premium Dark Green */
      }
    </style>
  </defs>

  <rect width="200" height="200" fill="#ffffff"/>
  
  <path class="glow-layer"
    d="M 149.79 58.22 A 65 65 0 1 1 111.29 35.99 L 100 100 Z" 
    stroke-width="12" 
    fill="none" 
    stroke-linejoin="miter" 
    stroke-miterlimit="10"
    filter="url(#darkGlow)"
  />

  <path 
    d="M 149.79 58.22 A 65 65 0 1 1 111.29 35.99 L 100 100 Z" 
    stroke="#000000" 
    stroke-width="12" 
    fill="none" 
    stroke-linejoin="miter" 
    stroke-miterlimit="10"
  />
</svg>
