<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 260" width="100%" height="100%">
  <defs>
    <filter id="greenGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00FF00" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#00FF00" flood-opacity="0.8"/>
    </filter>
    
    <style>
      @keyframes neon-blink {
        0%, 45% { filter: url(#greenGlow); }
        48%, 52% { filter: none; }
        55%, 58% { filter: url(#greenGlow); }
        60%, 95% { filter: none; }
        100% { filter: url(#greenGlow); }
      }
      
      .blink-legs {
        fill: #0c0e14;
        animation: neon-blink 3s infinite;
      }
      
      .solid-structure {
        fill: #0c0e14;
      }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="#ffffff" rx="10"/>
  
  <g class="blink-legs">
    <path d="M 78,90 
             L 45,155 
             L 65,155 
             L 35,235 
             L 85,145 
             L 65,145 
             L 108,90 Z"/>
    
    <path d="M 148,90 
             L 115,155 
             L 135,155 
             L 105,235 
             L 155,145 
             L 135,145 
             L 178,90 Z"/>
  </g>

  <path class="solid-structure" d="M 45,115 
                                   C 50,90 65,75 85,75 
                                   L 215,75 
                                   L 205,95 
                                   L 85,95 
                                   C 70,95 60,100 45,115 Z"/>
</svg>
