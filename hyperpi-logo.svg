<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 140" width="260" height="140">
  <defs>
    <filter id="glowring" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowsoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <style>
      @keyframes breathe {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.75; }
      }
      @keyframes tickblink {
        0%, 10% { opacity: 0; }
        15%, 25% { opacity: 1; }
        30%, 100%{ opacity: 0; }
      }
      .crosshair-main, .crosshair-glow {
        animation: breathe 4s ease-in-out infinite;
      }
      /* Staggered logic for the precision ticks */
      .tick-top { animation: tickblink 2s ease-in-out infinite; animation-delay: 0s; }
      .tick-right { animation: tickblink 2s ease-in-out infinite; animation-delay: 0.3s; }
      .tick-bottom { animation: tickblink 2s ease-in-out infinite; animation-delay: 0.6s; }
      .tick-left { animation: tickblink 2s ease-in-out infinite; animation-delay: 0.9s; }
    </style>
  </defs>

  <rect width="260" height="140" fill="#0c0e14"/>

  <circle cx="70" cy="70" r="20" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15" fill="none"/>

  <g class="crosshair-glow" filter="url(#glowsoft)" opacity="0.3">
    <circle cx="70" cy="70" r="36" stroke="#00ff9d" stroke-width="1.5" fill="none" stroke-dasharray="52 4.55 52 4.55 52 4.55 52 4.55" stroke-dashoffset="-2.275"/>
    <circle cx="70" cy="70" r="2.5" fill="#00ff9d"/>
    <line class="tick-top" x1="70" y1="22" x2="70" y2="30" stroke="#00ff9d" stroke-width="1.5" stroke-linecap="square"/>
    <line class="tick-right" x1="118" y1="70" x2="110" y2="70" stroke="#00ff9d" stroke-width="1.5" stroke-linecap="square"/>
    <line class="tick-bottom" x1="70" y1="118" x2="70" y2="110" stroke="#00ff9d" stroke-width="1.5" stroke-linecap="square"/>
    <line class="tick-left" x1="22" y1="70" x2="30" y2="70" stroke="#00ff9d" stroke-width="1.5" stroke-linecap="square"/>
  </g>

  <g class="crosshair-main" filter="url(#glowring)">
    <circle cx="70" cy="70" r="36" stroke="#00ff9d" stroke-width="1.5" fill="none" stroke-dasharray="52 4.55 52 4.55 52 4.55 52 4.55" stroke-dashoffset="-2.275"/>
    <circle cx="70" cy="70" r="2.5" fill="#00ff9d"/>
    <line class="tick-top" x1="70" y1="22" x2="70" y2="30" stroke="#00ff9d" stroke-width="1.5" stroke-linecap="square"/>
    <line class="tick-right" x1="118" y1="70" x2="110" y2="70" stroke="#00ff9d" stroke-width="1.5" stroke-linecap="square"/>
    <line class="tick-bottom" x1="70" y1="118" x2="70" y2="110" stroke="#00ff9d" stroke-width="1.5" stroke-linecap="square"/>
    <line class="tick-left" x1="22" y1="70" x2="30" y2="70" stroke="#00ff9d" stroke-width="1.5" stroke-linecap="square"/>
  </g>

  <text x="122" y="62" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="3" dominant-baseline="middle">kyn</text>
  <text x="122" y="86" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8" font-weight="400" fill="#00ff9d" letter-spacing="4" opacity="0.75" dominant-baseline="middle">PRECISION THAT THINKS</text>
</svg>
